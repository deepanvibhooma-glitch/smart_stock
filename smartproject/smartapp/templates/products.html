{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Products</title>
    <link rel="stylesheet" href="{% static 'product2.css' %}">
</head>

<body>

    {% include 'header.html' %}







    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #F7F7F7;
            /* var(--light-bg) */
            margin: 0;
            padding: 30px;
            color: #2C2C2C;
            /* var(--base-charcoal) */
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 500;
            color: #2C2C2C;
            /* var(--base-charcoal) */
        }

        .card {
            background: #ffffff;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-actions h2 {
            margin-bottom: 0;
        }

        .header-actions .buttons {
            display: flex;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            font-size: 13px;
            background: #D4A5A5;
            color: white;
            border-bottom: 1px solid #eee;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 14px;
        }

        tr:hover {
            background: #fafafa;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #D4A5A5;
            /* var(--primary-pink) */
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #2C2C2C;
            /* var(--primary-pink) */
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s ease;
        }

        button:hover {
            background: #B3A0B3;
            /* var(--hover-lavender) */
        }

        .btn-delete {
            background: #2C2C2C;
            padding: 8px 12px;
        }

        .btn-delete:hover {
            background: #d9363e;
        }

        .total-container {
            text-align: right;
            font-size: 18px;
            font-weight: 600;
            margin-top: 15px;
            color: #2C2C2C;
            /* var(--base-charcoal) */
        }

        .total-container span {
            color: #2C2C2C;
        }
    </style>

    <div class="container">
        <h1>Smart Stock - Products</h1>

        <div class="card">
            <div class="header-actions">
                <h2>Products Inventory</h2>
                <div class="buttons">
                    <button onclick="addRow()">+ ADD ROW</button>
                    <button onclick="saveData()">SAVE CHANGES</button>
                </div>
            </div>

            <table id="productTable">
                <thead>
                    <tr>
                        <th style="width: 5%;">#</th>
                        <th style="width: 40%;">Product</th>
                        <th style="width: 15%;">Quantity</th>
                        <th style="width: 20%;">Price (₹)</th>
                        <th style="width: 20%;">Delete</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td><input type="text" value="{{ product.name }}"></td>
                        <td><input type="number" value="{{ product.stock }}" onchange="updateTotal()"></td>
                        <td><input type="number" value="{{ product.price }}" onchange="updateTotal()"></td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">Delete</button></td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td>1</td>
                        <td><input type="text" value="New Product"></td>
                        <td><input type="number" value="1" onchange="updateTotal()"></td>
                        <td><input type="number" value="0" onchange="updateTotal()"></td>
                        <td><button class="btn-delete" onclick="deleteRow(this)">Delete</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="total-container">Total amount: ₹<span id="totalAmount">0</span></div>

        </div> <!-- End of Card -->
    </div> <!-- End of Container -->

    <script>
        function updateTotal() {
            const table = document.getElementById('productTable').getElementsByTagName('tbody')[0];
            let total = 0;
            for (let row of table.rows) {
                const qty = parseFloat(row.cells[2].children[0].value) || 0;
                const price = parseFloat(row.cells[3].children[0].value) || 0;
                total += qty * price;
            }
            document.getElementById('totalAmount').innerText = total;
        }

        function addRow() {
            const table = document.getElementById('productTable').getElementsByTagName('tbody')[0];
            const rowCount = table.rows.length;
            const row = table.insertRow();

            row.innerHTML = `
    <td>${rowCount + 1}</td>
    <td><input type="text" value="New Product"></td>
    <td><input type="number" value="1" onchange="updateTotal()"></td>
    <td><input type="number" value="0" onchange="updateTotal()"></td>
    <td><button class="btn-delete" onclick="deleteRow(this)">Delete</button></td>
  `;
            updateTotal();
        }

        function deleteRow(button) {
            const row = button.parentNode.parentNode;
            row.parentNode.removeChild(row);
            // Update row numbers
            const table = document.getElementById('productTable').getElementsByTagName('tbody')[0];
            Array.from(table.rows).forEach((r, i) => r.cells[0].innerText = i + 1);
            updateTotal();
        }

        // Initialize total
        updateTotal();

        function saveData() {
            const table = document.getElementById('productTable').getElementsByTagName('tbody')[0];
            const data = [];
            for (let row of table.rows) {
                const productName = row.cells[1].children[0].value;
                const qty = parseFloat(row.cells[2].children[0].value) || 0;
                const price = parseFloat(row.cells[3].children[0].value) || 0;

                data.push({
                    name: productName,
                    stock: qty,
                    price: price
                });
            }

            fetch('{% url "save_products" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Products saved successfully!');
                    } else {
                        alert('Error saving products: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('An error occurred while saving.');
                });
        }
    </script>





    <script src="{% static 'product3.js' %}"></script>

    {% include 'footer.html' %}
</body>

</html>
